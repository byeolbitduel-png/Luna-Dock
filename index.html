<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Dock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
--dark:#0A3323;
--moss:#839958;
--beige:#F7F4D5;
--rose:#D3968C;
--soft:#ffffffcc;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#F7F4D5,#f0edd2);
color:#1e1e1e;
}

header{
position:fixed;
top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:14px 18px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(0,0,0,0.05);
z-index:1000;
}

.logo{
font-family:'Playfair Display';
font-size:20px;
letter-spacing:0.5px;
}

.search{
padding:8px 10px;
border-radius:12px;
border:none;
background:#ffffffaa;
}

.hamburger{font-size:22px;cursor:pointer}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:240px;
height:100%;
background:var(--dark);
padding:30px 20px;
transition:0.3s;
z-index:1100;
}

.sidebar a{
display:block;
color:white;
margin:18px 0;
text-decoration:none;
font-size:15px;
opacity:0.9;
}

.sidebar.active{left:0}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:1000;
}

.overlay.active{display:block}

.hero{
height:65vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1400') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;
color:white;
padding:20px;
margin-top:70px;
}

.hero h1{
font-family:'Playfair Display';
font-size:38px;
line-height:1.3;
}

.container{padding:20px}
.section{margin-bottom:60px}

.section h2{
font-family:'Playfair Display';
margin-bottom:10px;
}

.card{
background:var(--soft);
backdrop-filter:blur(10px);
border-radius:20px;
padding:16px;
margin-bottom:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.product{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.06);
transition:0.3s;
}

.product:hover{
transform:translateY(-4px);
}

.product img{
width:100%;
height:130px;
object-fit:cover;
}

.product p{
margin:12px;
font-size:14px;
}

.product a{
display:block;
margin:12px;
background:linear-gradient(135deg,#839958,#0A3323);
color:white;
padding:8px;
border-radius:10px;
text-decoration:none;
text-align:center;
font-size:13px;
}

.filters{
display:flex;
gap:8px;
margin-bottom:12px;
}

button{
border:none;
padding:6px 12px;
border-radius:12px;
background:#ffffffaa;
backdrop-filter:blur(6px);
cursor:pointer;
}

iframe{
border-radius:16px;
margin-top:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

@media (min-width:768px){
.products{grid-template-columns:repeat(3,1fr)}
.hero h1{font-size:48px}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<header>
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="logo">🌙 Luna Dock</div>
<input class="search" id="search" placeholder="Search" oninput="searchItems()">
</header>

<div class="sidebar" id="sidebar">
<a href="#hair" onclick="closeMenu()">Hair</a>
<a href="#diet" onclick="closeMenu()">Diet</a>
</div>

<div class="hero">
<h1>Aligned with your rhythm</h1>
</div>

<div class="container">

<div id="hair" class="section">
<h2>Hair Ritual</h2>
<div class="filters">
<button onclick="filter('all')">All</button>
<button onclick="filter('luxury')">Luxury</button>
<button onclick="filter('budget')">Budget</button>
<button onclick="filter('pharma')">Pharma</button>
</div>
<div class="products">
<div class="product luxury">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=400">
<p>Kérastase Serum</p>
<a href="https://www.nykaa.com" target="_blank">Explore</a>
</div>
<div class="product budget">
<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=400">
<p>Minimalist Serum</p>
<a href="https://beminimalist.co" target="_blank">Explore</a>
</div>
<div class="product pharma">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=400">
<p>Ketoconazole Shampoo</p>
<a href="https://www.amazon.in" target="_blank">Explore</a>
</div>
</div>
</div>

<div id="diet" class="section">
<h2>PCOS Nourishment</h2>
<iframe width="100%" height="220" src="https://www.youtube.com/embed/U3Ov2fHfC6k" allowfullscreen></iframe>
<iframe width="100%" height="220" src="https://www.youtube.com/embed/QxK2v2w8l7k" allowfullscreen></iframe>
</div>

</div>

<script>
function toggleMenu(){
 document.getElementById('sidebar').classList.toggle('active');
 document.getElementById('overlay').classList.toggle('active');
}

function closeMenu(){
 document.getElementById('sidebar').classList.remove('active');
 document.getElementById('overlay').classList.remove('active');
}

function filter(type){
 document.querySelectorAll('.product').forEach(p=>{
  p.style.display=(type==='all'||p.classList.contains(type))?'block':'none';
 });
}

function searchItems(){
 let q=document.getElementById('search').value.toLowerCase();
 document.querySelectorAll('.product').forEach(p=>{
  p.style.display=p.innerText.toLowerCase().includes(q)?'block':'none';
 });
}
</script>

</body>
</html>
